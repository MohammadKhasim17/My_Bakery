<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Not Found — My Bakery Admin</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
    <main class="container error-page" style="text-align:center;padding:4rem 1rem;">
        <h1>404 — Product Not Found</h1>
        <p th:text="${errorMessage}">The requested product could not be found.</p>
        <a th:href="@{/admin/products}" class="btn btn-primary">Back to Admin</a>
    </main>
</body>
</html>
