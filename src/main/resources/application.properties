# ============================================
# MyBakery Application Configuration
# ============================================

# Server port (default 8080)
server.port=${PORT:8080}

# --- Database Connection ---
# Render and other cloud providers set PORT automatically.
# Set SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD, and optionally SPRING_DATASOURCE_DRIVER in the cloud environment.
# Local defaults below still use MySQL for development.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/mybakery?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Hannu@1315}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:com.mysql.cj.jdbc.Driver}

# --- JPA / Hibernate ---
# validate = check schema matches entities (use update for dev, validate for prod)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- Thymeleaf ---
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# --- File upload limits ---
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# --- Logging (helpful during development) ---
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.mybakery=INFO
