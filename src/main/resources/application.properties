# ============================================
# MyBakery Application Configuration
# ============================================

# Server port (default 8080)
server.port=8080

# --- MySQL Database Connection ---
# Update username and password to match your local MySQL installation
spring.datasource.url=jdbc:mysql://localhost:3306/mybakery?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Hannu@1315
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
# validate = check schema matches entities (use update for dev, validate for prod)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- Thymeleaf ---
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# --- File upload limits ---
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# --- Logging (helpful during development) ---
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.mybakery=INFO
